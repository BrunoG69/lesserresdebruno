<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Contact | Les Serres de Bruno
    </title>
    <meta name="description"
        content="Contactez Les Serres de Bruno à Villefranche-sur-Saône pour vos fleurs, plantes et plants potagers.">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/images/favicon/site.webmanifest">
    <link rel="shortcut icon" href="assets/images/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


    <!-- HEADER -->
    <div id="header"></div>
    <!-- HEADER PAGE -->
    <section class="page-header">
        <div class="container text-center">
            <h1>Contact</h1>
            <p>Venez nous rencontrer aux Serres de Bruno</p>
        </div>
    </section>
    <!-- CONTACT -->
    <section class="section">
        <div class="container">
            <div class="row g-5">
                <!-- INFOS -->
                <div class="col-lg-5" data-aos="fade-right">
                    <h2>Nous trouver</h2>
                    <p>
                        <i class="fa-solid fa-location-dot"></i>
                        230 Boulevard Général Leclerc<br>
                        69400 Villefranche-sur-Saône
                    </p>
                    <p>
                        <i class="fa-solid fa-phone"></i>
                        <a href="tel:0474687101">
                            04 74 68 71 01
                        </a>
                    </p>
                    <p>
                        <i class="fa-solid fa-envelope"></i>
                        <a href="mailto:contact@lesserresdebruno.fr">
                            contact@lesserresdebruno.fr
                        </a>
                    </p>
                    <h3 class="mt-4">Horaires</h3>
                    <p>
                        Lundi - Samedi<br>
                        9h00 - 12h00<br>
                        14h00 - 19h00
                    </p>
                    <a href="https://www.google.com/maps/search/?api=1&query=230+Boulevard+Général+Leclerc+69400+Villefranche-sur-Saône"
                        target="_blank" class="btn btn-green">
                        <i class="fa-solid fa-route"></i>
                        Itinéraire
                    </a>
                </div>
                <!-- FORMULAIRE -->
                <div class="col-lg-7" data-aos="fade-left">
                    <div class="contact-box">
                        <h2>Une question ?</h2>
                        <p>Envoyez-nous un message.</p>
                        <form id="contactForm">
                            <div class="mb-3">
                                <input type="text" name="name" class="form-control" placeholder="Votre nom" required>
                            </div>
                            <div class="mb-3">
                                <input type="email" name="email" class="form-control" placeholder="Votre email" required>
                            </div>
                            <div class="mb-3">
                                <textarea name="message" class="form-control" rows="5" placeholder="Votre message" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-green" id="submitBtn">
                                Envoyer
                            </button>

                            <div id="formStatus" class="mt-3"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- MAP -->
    <section class="map">
        <iframe
            src="https://maps.google.com/maps?q=230%20Boulevard%20Général%20Leclerc%2069400%20Villefranche-sur-Saône&t=&z=15&ie=UTF8&iwloc=&output=embed"
            width="100%" height="550" style="border:0" loading="lazy">
        </iframe>
    </section>
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
